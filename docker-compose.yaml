version: '3.8'

services:
  php:
    build: ./backend
    container_name: mybank-php
    volumes:
      - ./backend:/var/www
    depends_on:
      - db

  nginx:
    image: nginx:alpine
    container_name: mybank-nginx
    ports:
      - "8000:80"
    volumes:
      - ./backend:/var/www
      - ./backend/nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - php

  db:
    image: mysql:5.7
    container_name: mybank-db
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: mybank
    ports:
      - "3306:3306"

  frontend:
    build: ./frontend
    container_name: mybank-frontend
    ports:
      - "3000:3000"